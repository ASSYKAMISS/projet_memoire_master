<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}ChainSign AI{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root{
            --primary:#0057D9;
            --primary-dark:#0047B3;
            --dark:#071B3A;
            --border:#E4EBF5;
            --bg:#F8FBFF;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            background:white;
            color:#0F172A;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        /* NAVBAR */

        .navbar-custom{
            background:white;
            border-bottom:1px solid var(--border);
            padding:15px 0;
        }

        .brand{
            font-size:1.7rem;
            font-weight:800;
            text-decoration:none;
            color:var(--dark);
        }

        .brand:hover{
            color:var(--dark);
        }

        .brand span{
            color:var(--primary);
        }

        .btn-auth{
            background:var(--primary);
            color:white;
            border-radius:12px;
            padding:10px 20px;
            text-decoration:none;
            font-weight:700;
            transition:.3s;
        }

        .btn-auth:hover{
            background:var(--primary-dark);
            color:white;
        }

        /* CONTENT */

        .main-content{
            flex:1;
        }

        /* FOOTER */

        footer{
            border-top:1px solid var(--border);
            background:#FAFBFD;
            margin-top:60px;
            padding:30px 0;
            color:#64748B;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<!-- MESSAGES -->

<div class="container mt-3">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

</div>

<!-- CONTENU -->

<div class="main-content">

    {% block content %}
    {% endblock %}

</div>

<!-- FOOTER -->

<footer>

    <div class="container text-center">

        <h5 class="fw-bold">
            ChainSign AI
        </h5>

        <p class="mb-1">
            Prototype de signature électronique sécurisée intégrant
            Blockchain, Cryptographie et Intelligence Artificielle.
        </p>

        <small>
            © 2026 - Mémoire de Master
        </small>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
