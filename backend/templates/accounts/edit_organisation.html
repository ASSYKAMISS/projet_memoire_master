{% extends "base.html" %}

{% block title %}Modifier l'organisation{% endblock %}
{% block page_title %}Modifier l'organisation{% endblock %}
{% block page_subtitle %}Mise à jour des informations de l'organisation{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nom de l'organisation</label>
                    <input type="text" name="nom" class="form-control" value="{{ organisation.nom }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ organisation.description }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Adresse</label>
                    <input type="text" name="adresse" class="form-control" value="{{ organisation.adresse }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Téléphone</label>
                    <input type="text" name="telephone" class="form-control" value="{{ organisation.telephone }}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ organisation.email }}">
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'organisations' %}" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
